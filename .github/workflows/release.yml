name: Build and Release Executable

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0, v1.0.0
  release:
    types: [published] # Triggers when you publish a release manually on GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller -y tracker.spec

    - name: Zip the executable build
      shell: powershell
      run: |
        Compress-Archive -Path dist/DailyOfficeWorkTracker/* -DestinationPath dist/DailyOfficeWorkTracker-Windows.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
      with:
        files: dist/DailyOfficeWorkTracker-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
